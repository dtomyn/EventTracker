<div class="entry-preview-header d-flex justify-content-between align-items-start p-3 border-bottom gap-3">
    <div class="entry-preview-title-block min-w-0">
        <div class="d-flex flex-wrap align-items-center gap-2 text-body-secondary small mb-1">
            <span class="font-mono">{{ entry.display_date }}</span>
            <span class="badge rounded-pill text-bg-light border">{{ entry.group_name }}</span>
        </div>
        <h2 class="h6 fw-bold mb-0">{{ entry.title }}</h2>
    </div>
    <div class="d-flex gap-2 flex-shrink-0">
        <a class="btn btn-sm btn-outline-secondary" href="/entries/{{ entry.id }}">Edit</a>
        <a class="btn btn-sm btn-outline-secondary" href="/entries/{{ entry.id }}/view">Full page →</a>
        <button class="btn btn-sm btn-outline-secondary" type="button" data-preview-close aria-label="Close preview">&times;</button>
    </div>
</div>
<div class="entry-preview-body p-3">
    {% if entry.tags %}
        <div class="d-flex flex-wrap gap-2 mb-3">
            {% for tag in entry.tags %}
                <span class="badge text-bg-light border">{{ tag }}</span>
            {% endfor %}
        </div>
    {% endif %}

    <div class="entry-rich-text mb-3">{{ entry.final_text | render_entry_html | safe }}</div>

    {% if entry.source_url %}
        <div class="border-top pt-3 mt-3">
            <div class="text-body-secondary small mb-1">Source</div>
            <a href="{{ entry.source_url }}" class="small link-secondary text-break" target="_blank" rel="noreferrer">{{ entry.source_url }}</a>
        </div>
    {% endif %}
</div>
