{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1">
                    <li class="breadcrumb-item"><a href="/?group_id={{ group.id }}" class="text-decoration-none">{{ group.name }}</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Tag Clusters</li>
                </ol>
            </nav>
            <h1 class="h3 mb-0">Tag Clusters</h1>
        </div>
        <div class="col-auto">
            <a href="/?group_id={{ group.id }}" class="btn btn-outline-secondary">Back to Timeline</a>
        </div>
    </div>

    <div class="card shadow-sm border-0 bg-dark-subtle position-relative">
        <div id="loading-spinner" class="position-absolute top-50 start-50 translate-middle text-center" style="z-index: 10;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading clusters...</span>
            </div>
            <p class="mt-2 text-muted">Generating AI clusters...</p>
        </div>
        <div class="card-body p-0">
            <div id="graph-container" style="min-height: 600px; width: 100%; position: relative;">
                <div class="position-absolute top-0 end-0 p-3" style="z-index: 5;">
                    <div class="btn-group shadow-sm" role="group" aria-label="Graph zoom controls">
                        <button id="zoom-out-button" type="button" class="btn btn-light" aria-label="Zoom out" disabled>
                            -
                        </button>
                        <button id="zoom-in-button" type="button" class="btn btn-light" aria-label="Zoom in" disabled>
                            +
                        </button>
                    </div>
                </div>
                <svg id="topic-graph-svg" style="width: 100%; height: 100%; min-height: 600px; display: block;"></svg>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const groupId = {{ group.id }};
        const container = document.getElementById("graph-container");
        const svgElement = document.getElementById("topic-graph-svg");
        const loadingSpinner = document.getElementById("loading-spinner");
        const zoomInButton = document.getElementById("zoom-in-button");
        const zoomOutButton = document.getElementById("zoom-out-button");

        let currentSimulation = null;
        let currentZoomBehavior = null;
        let currentSvg = null;

        function setZoomButtonsDisabled(disabled) {
            zoomInButton.disabled = disabled;
            zoomOutButton.disabled = disabled;
        }

        function applyZoom(scaleFactor) {
            if (!currentSvg || !currentZoomBehavior) {
                return;
            }

            currentSvg
                .transition()
                .duration(180)
                .call(currentZoomBehavior.scaleBy, scaleFactor);
        }

        zoomInButton.addEventListener("click", () => applyZoom(1.2));
        zoomOutButton.addEventListener("click", () => applyZoom(0.8));

        function renderGraph(data) {
            loadingSpinner.style.display = 'none';

            if (!data.nodes || data.nodes.length === 0) {
                setZoomButtonsDisabled(true);
                container.innerHTML = '<p class="text-muted text-center pt-5 mt-5">No tag clusters found or embeddings are unavailable.</p>';
                return;
            }

            const nodeSizes = data.nodes.map(node => node.size);
            const minNodeSize = d3.min(nodeSizes) ?? 1;
            const maxNodeSize = d3.max(nodeSizes) ?? 1;
            const midpointNodeSize = minNodeSize === maxNodeSize ? maxNodeSize : minNodeSize + ((maxNodeSize - minNodeSize) / 2);
            const themeStyles = getComputedStyle(document.documentElement);
            const baseInfo = themeStyles.getPropertyValue("--bs-info").trim() || "#0dcaf0";
            const basePrimary = themeStyles.getPropertyValue("--bs-primary").trim() || "#0d6efd";
            const baseWarning = themeStyles.getPropertyValue("--bs-warning").trim() || "#ffc107";
            const bodyBackground = themeStyles.getPropertyValue("--bs-body-bg").trim() || "#ffffff";
            const radiusScale = minNodeSize === maxNodeSize
                ? () => 34
                : d3.scaleSqrt().domain([minNodeSize, maxNodeSize]).range([18, 56]);
            const strokeWidthScale = minNodeSize === maxNodeSize
                ? () => 2.5
                : d3.scaleLinear().domain([minNodeSize, maxNodeSize]).range([2, 4.5]);
            const fontSizeScale = minNodeSize === maxNodeSize
                ? () => 14
                : d3.scaleLinear().domain([minNodeSize, maxNodeSize]).range([11, 18]);
            const colorScale = minNodeSize === maxNodeSize
                ? () => basePrimary
                : d3.scaleLinear()
                    .domain([minNodeSize, midpointNodeSize, maxNodeSize])
                    .range([baseInfo, basePrimary, baseWarning])
                    .interpolate(d3.interpolateHcl);

            function getNodeRadius(node) {
                return radiusScale(node.size);
            }

            function getNodeStrokeWidth(node) {
                return strokeWidthScale(node.size);
            }

            function getNodeFill(node) {
                return colorScale(node.size);
            }

            function getNodeHoverFill(node) {
                const color = d3.color(getNodeFill(node));
                return color ? color.brighter(0.6).formatHex() : getNodeFill(node);
            }

            const width = container.clientWidth;
            const height = 600;

            const svg = d3.select(svgElement);
            svg.selectAll("*").remove(); 
            currentSvg = svg;

            // Setup force simulation
            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.edges).id(d => d.id).distance(d => 150 - (d.weight * 50)).strength(d => d.weight))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => getNodeRadius(d) + 12).iterations(2));

            currentSimulation = simulation;

            const g = svg.append("g");

            // Add zoom capabilities
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                });
            svg.call(zoom);
            svg.on("dblclick.zoom", null);
            currentZoomBehavior = zoom;
            setZoomButtonsDisabled(false);

            const link = g.append("g")
                .selectAll("line")
                .data(data.edges)
                .join("line")
                .style("stroke", "var(--bs-border-color)")
                .attr("stroke-opacity", 0.6)
                .attr("stroke-width", d => Math.max(1, d.weight * 5));

            const nodeGroup = g.append("g")
                .selectAll("g")
                .data(data.nodes)
                .join("g")
                .style("cursor", "pointer")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("dblclick", (event, d) => {
                    event.stopPropagation();

                    if (event.defaultPrevented || d.wasDragged) {
                        d.wasDragged = false;
                        return;
                    }

                    const label = d.label && d.label !== "Topic" ? d.label : "";
                    if (label) {
                        window.location.href = `/?q=${encodeURIComponent(label)}&group_id=${groupId}`;
                    } else {
                        // fallback if no label, though usually backend returns "Topic"
                        window.location.href = `/?group_id=${groupId}`;
                    }
                })
                .on("mouseover", function(event, d) {
                    d3.select(this)
                        .select("circle")
                        .style("fill", getNodeHoverFill(d))
                        .style("stroke", baseWarning)
                        .style("stroke-width", `${getNodeStrokeWidth(d) + 1.25}px`);
                })
                .on("mouseout", function(event, d) {
                    d3.select(this)
                        .select("circle")
                        .style("fill", getNodeFill(d))
                        .style("stroke", bodyBackground)
                        .style("stroke-width", `${getNodeStrokeWidth(d)}px`);
                });

            // Node scaling
            nodeGroup.append("circle")
                .attr("r", d => getNodeRadius(d))
                .style("fill", d => getNodeFill(d))
                .style("stroke", bodyBackground)
                .style("stroke-width", d => `${getNodeStrokeWidth(d)}px`);

            nodeGroup.append("title")
                .text(d => {
                    const label = d.label || "Tag cluster";
                    const suffix = d.size === 1 ? "occurrence" : "occurrences";
                    return `${label}: ${d.size} ${suffix}`;
                });

            // Labels
            nodeGroup.append("text")
                .text(d => d.label || "Topic")
                .attr("text-anchor", "middle")
                .attr("dy", ".3em")
                .attr("font-size", d => `${fontSizeScale(d.size)}px`)
                .attr("font-weight", "500")
                .style("fill", "var(--bs-body-color)")
                .style("pointer-events", "none");

            function ticked() {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                nodeGroup
                    .attr("transform", d => `translate(${d.x},${d.y})`);
            }

            simulation.on("tick", ticked);

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.wasDragged = false;
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.wasDragged = true;
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            
            // Handle window resize
            window.addEventListener('resize', () => {
                svg.attr("width", container.clientWidth);
                simulation.force("center", d3.forceCenter(container.clientWidth / 2, height / 2));
                simulation.alpha(0.3).restart();
            });
        }

        // Fetch graph data
        fetch(`/api/groups/${groupId}/topics`)
            .then(res => {
                if (!res.ok) throw new Error("Failed to load topic clusters");
                return res.json();
            })
            .then(data => {
                renderGraph(data);
            })
            .catch(err => {
                loadingSpinner.style.display = 'none';
                setZoomButtonsDisabled(true);
                container.innerHTML = `<p class="text-danger text-center pt-5 mt-5">Error loading tag clusters: ${err.message}</p>`;
            });
    });
</script>
{% endblock %}
