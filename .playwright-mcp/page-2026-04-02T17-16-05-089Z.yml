                      - text: let Codex spawn specialized agents in parallel and consolidate their results into a single response, useful for highly parallel tasks (e.g., codebase exploration or multi-step feature plans) and for defining custom agents with different model configurations and instructions. Subagent workflows are enabled by default and are currently surfaced in the Codex app and CLI (IDE extension coming soon); Codex only spawns subagents when explicitly requested. Codex orchestrates spawning, routing, waiting for results, and closing threads; subagent runs consume more tokens and can introduce tradeoffs such as context pollution and context rot. Subagents inherit the parent sandbox policy and live runtime overrides; in interactive CLI sessions approval requests from inactive threads surface via an overlay showing the source thread label (press "o" to open), while in non-interactive flows actions requiring new approval fail back to the parent workflow.
