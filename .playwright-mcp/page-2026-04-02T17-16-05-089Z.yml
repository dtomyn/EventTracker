                    - paragraph [ref=e351]: "In early 2026, the open-source project OpenClaw sparks a frenzy, around persistent, autonomous coding agents. Initially known as “Clawdbot,” OpenClaw provides a local-first, autonomous agent platform that can run continuously and perform tasks end-to-end. Within weeks of its v1 release, OpenClaw’s user base exploded (over 180,000 developers by Jan 2026, per VentureBeat) and even garnered a passionate community movement nicknamed “raising lobsters” in China. Chinese tech giants scrambled to integrate or offer OpenClaw services – for example, Alibaba’s “JVS Claw” app (launched Mar 12, 2026) lets anyone deploy OpenClaw agents on mobile devices within minutes. This mass adoption of an always-on AI agent led to both supportive local government policies and national security restrictions in China, highlighting excitement about agentic AI’s potential as well as concerns about autonomous software running unsupervised. OpenClaw’s saga underlines a pivotal moment: AI agents proved they can operate persistently and at scale in the wild, performing multi-step tasks like a human developer – and forcing organizations worldwide to consider new security and governance measures for autonomous AI assistants."
