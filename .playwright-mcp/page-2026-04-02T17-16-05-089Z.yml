                    - paragraph [ref=e291]: Microsoft’s open-source Agent Framework (codenamed “AgentFx”) hits its 1.0 Release Candidate. Evolving from earlier projects like Semantic Kernel, the Agent Framework provides a unified SDK for building robust AI agents in Python and .NET. It supports features such as multi-agent orchestration, shareable ** agent “plugins”, memory persistence, and integrated support for **Agent-to-Agent (A2A) communication (so different agents can message/delegate to each other). The RC status means enterprises can begin relying on AgentFx for production use, confident in Microsoft’s backing and forthcoming full support. Together with Foundry Local (a preview tool for running LLMs on-premises, also introduced in late 2025), Microsoft’s agent platform enables organizations to build self-hosted, collaborative AI coding agents with enterprise-grade security and compliance – integrating not just OpenAI models but also third-party and open-source LLMs into their development processes.
