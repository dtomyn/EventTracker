                    - paragraph [ref=e392]: "Vercel and the open-source community launch Skills.sh, a public registry of Agent Skills (reusable prompt and tool modules for AI agents). Much like an app store or package manager, Skills.sh lets developers share and download predefined “skills” to quickly extend an AI agent’s capabilities (for example, a web-scraping skill or React debugging skill). Within days, thousands of users download skills ranging from database querying to graphic design. Skills.sh embodies the shift to modular context engineering: rather than hand-crafting prompts, users can now plug in community-created context packages that teach their AI new tricks. This development makes customizing agentic coding assistants easier and accelerates a virtuous cycle: as more skills are contributed, AI agents continually become more capable and specialized for various domains and tasks."
