                    - generic [ref=e172]: Microsoft’s Copilot Cowork brings agentic AI to Office apps
                    - paragraph [ref=e174]: At its “Future of Work” event, Microsoft announces Copilot Cowork – a new capability for Microsoft 365 Copilot that introduces a persistent AI agent to the Office suite. Built in partnership with Anthropic and leveraging the long-context, long-running Claude model, Copilot Cowork can work autonomously on tasks across Word, Excel, Outlook, and Teams on a user’s behalf, continuing even when the user is offline. For example, a project manager can ask Cowork to draft a proposal, analyze budget spreadsheets, and prepare a PowerPoint deck overnight; the agent will use the user’s documents and company data (via Microsoft’s Work IQ contextual engine) to produce outputs and coordinate with colleagues via email – all with checkpoints for approval. Cowork transitions Microsoft’s assistant from simple Q&A to a true “autopilot mode” for office work. It underscores a multi-model strategy (Copilot now chooses the best AI model per task, not just using OpenAI by default) and signals that agentic AI has arrived in everyday productivity software.
